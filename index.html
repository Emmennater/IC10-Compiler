<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IC10 Compiler</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <hbox class="main">
    <vbox class="panel">
      <hbox>
        <div class="header">
          <span class="title">
            <span class="mid">Compiler</span> //
            <span class="end">v1.0</span>
          </span>
          <button id="run">Run</button>
        </div>
      </hbox>
      <div id="editor-container" class="text-editor"></div>
    </vbox>
    <vbox class="panel right">
      <hbox>
        <div class="header">
          <span class="title">
            <span class="output">IC10</span>
          </span>
          <button id="copy">Copy</button>
        </div>
      </hbox>
      <div id="output-container" class="text-editor"></div>
    </vbox>
  </vbox>
  <script type="module" src="main.js"></script>
</body>
</html>
